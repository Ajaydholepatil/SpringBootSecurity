# Application name
spring.application.name=demo
server.port=8080

book.scheduler.cron=0 */1 * * * *

# JWT Configuratios
jwt.secret=mysecretkeymysecretkeymysecretkey123
jwt.access.expiration=60000
jwt.refresh.expiration=604800000  
